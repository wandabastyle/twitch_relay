services:
  twitch-relay:
    image: ghcr.io/wandabastyle/twitch_relay:latest
    pull_policy: always
    container_name: twitch-relay
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "18081:8080"
    env_file:
      - .env
    environment:
      BIND_ADDR: 0.0.0.0:8080
      STREAM_DELIVERY_MODE: cdn_first # cdn_first | relay
      STREAMLINK_PATH: streamlink
      STREAM_RESOLVER_MODE: streamlink # auto | native | streamlink
      TWITCH_CLIENT_ID: kimne78kx3ncx6brgo4mv6wki5h1ko
      XDG_DATA_HOME: /data
      RECORDINGS_DIR: /app/recordings
      RECORDING_DEFAULT_QUALITY: best
      RECORDING_POLL_INTERVAL_SECS: 45
      RECORDING_START_LIVE_CONFIRMATIONS: 2
      RECORDING_STOP_OFFLINE_CONFIRMATIONS: 3
      RECORDING_WRITE_NFO: "true"
      FFMPEG_PATH: ffmpeg
      RECORDING_CHAPTER_MIN_GAP_SECS: 180
      RECORDING_CHAPTER_CHANGE_CONFIRMATIONS: 2
      RECORDING_HLS_SEGMENT_DURATION: 6
      RECORDING_HLS_CACHE_TTL_SECS: 259200
    volumes:
      - twitch-relay-data:/data
      - ./recordings:/app/recordings
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  twitch-relay-data:
